baseURL = 'https://openclawgotchi.github.io/doc/'
languageCode = 'ru-ru'
title = 'Gotchi Bot Docs'
theme = 'simple'

# Прямые ссылки (без baseurl)
canonifyURLs = true
relativeURLs = false

[markup]
  [markup.highlight]
    anchorLineNos = false
    lineNos = false
    lineNumbersInTable = true
    noClasses = true
    style = 'github-dark'
    tabWidth = 4

# Permalinks для статей
[permalinks]
  articles = "/articles/:filename/"
  posts = "/posts/:filename/"
  docs = "/docs/:filename/"

[menu]
  [[menu.main]]
    name = "Documentation"
    url = "/docs/"
    weight = 1
  [[menu.main]]
    name = "Articles"
    url = "/articles/"
    weight = 2
  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 3

# Taxonomies
[taxonomies]
  tag = "tags"
  category = "categories"
